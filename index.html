<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShyamRiwaaz | GOD MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#050505;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px 20px;
position:sticky;
top:0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
}

h1{font-family:"Playfair Display";font-size:22px;}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:30px;
justify-content:center;
}

.card{
width:240px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:15px;
border-radius:15px;
transition:0.3s;
}

.card:hover{transform:translateY(-6px);border-color:#d4af37;}

.price{color:#d4af37;margin:8px 0;}

button{
cursor:pointer;
border:none;
border-radius:10px;
padding:10px;
}

.add{
width:100%;
background:#d4af37;
color:black;
}

/* CART BUTTON */
.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
z-index:999;
}

.box{
width:92%;
max-width:420px;
background:#111;
padding:20px;
border-radius:15px;
}

input,textarea{
width:100%;
margin:5px 0;
padding:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
font-size:14px;
margin:5px 0;
}

.total{
color:#d4af37;
font-weight:bold;
margin-top:10px;
}

.smallBtn{
background:#25D366;
width:100%;
margin-top:10px;
}

.close{
background:#333;
width:100%;
margin-top:8px;
color:white;
}

.adminBtn{
position:fixed;
left:20px;
bottom:20px;
background:#444;
color:white;
padding:10px 14px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>ShyamRiwaaz</h1>
<button onclick="openAdmin()">Admin</button>
</header>

<!-- PRODUCTS -->
<div class="container">

<div class="card">
<h3>Luxury Magazine</h3>
<div class="price">₹450</div>
<button class="add" onclick="add('Luxury Magazine',450)">Add</button>
</div>

<div class="card">
<h3>Polaroid Set</h3>
<div class="price">₹250</div>
<button class="add" onclick="add('Polaroid Set',250)">Add</button>
</div>

<div class="card">
<h3>Frame Design</h3>
<div class="price">₹300</div>
<button class="add" onclick="add('Frame Design',300)">Add</button>
</div>

<div class="card">
<h3>Gift Album</h3>
<div class="price">₹650</div>
<button class="add" onclick="add('Gift Album',650)">Add</button>
</div>

</div>

<!-- CART BUTTON -->
<div class="cartBtn" onclick="openCart()">🛒</div>

<!-- ADMIN BUTTON -->
<button class="adminBtn" onclick="openAdmin()">ADMIN</button>

<!-- CART -->
<div class="modal" id="cart">
<div class="box">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total" id="total"></div>

<input id="address" placeholder="Delivery Address">
<input id="coupon" placeholder="Coupon Code">

<button class="smallBtn" onclick="checkout()">Checkout WhatsApp</button>
<button class="close" onclick="closeCart()">Close</button>
</div>
</div>

<!-- ADMIN -->
<div class="modal" id="admin">
<div class="box">
<h2>Admin Panel</h2>

<input id="pass" placeholder="Enter Password">

<button class="smallBtn" onclick="loginAdmin()">Login</button>

<div id="adminPanel" style="display:none;">
<h3>Orders</h3>
<div id="orders"></div>

<button class="smallBtn" onclick="exportCSV()">Export CSV</button>
</div>

<button class="close" onclick="closeAdmin()">Close</button>
</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function add(name,price){
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
alert(name+" added");
}

function openCart(){
document.getElementById("cart").style.display="flex";
renderCart();
}

function closeCart(){
document.getElementById("cart").style.display="none";
}

function renderCart(){
let html="";
let total=0;

cart.forEach(i=>{
html+=`<div class="row"><span>${i.name}</span><span>₹${i.price}</span></div>`;
total+=i.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText="Total: ₹"+total;
}

function checkout(){

let address=document.getElementById("address").value;
let coupon=document.getElementById("coupon").value;

let discount=0;
let total=cart.reduce((a,b)=>a+b.price,0);

// coupon system
if(coupon==="SHYAM10") discount=total*0.1;

let finalTotal=total-discount;

// delivery rule
if(finalTotal<500) finalTotal+=50;

let phone="91XXXXXXXXXX";

let msg="🛍️ ORDER\n\n";

cart.forEach(i=>{
msg+=i.name+" - ₹"+i.price+"\n";
});

msg+="\nAddress: "+address;
msg+="\nTotal: ₹"+finalTotal;

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));

orders.push({cart,address,finalTotal,date:new Date().toLocaleString()});
localStorage.setItem("orders",JSON.stringify(orders));

cart=[];
localStorage.removeItem("cart");
}

function openAdmin(){
document.getElementById("admin").style.display="flex";
}

function closeAdmin(){
document.getElementById("admin").style.display="none";
}

function loginAdmin(){
let pass=document.getElementById("pass").value;

if(pass==="admin123"){
document.getElementById("adminPanel").style.display="block";
renderOrders();
}else{
alert("Wrong password");
}
}

function renderOrders(){
let html="";
orders.forEach((o,i)=>{
html+=`<div style="border-bottom:1px solid #333;margin:10px 0;">
<b>Order ${i+1}</b><br>
₹${o.finalTotal}<br>
${o.date}
</div>`;
});
document.getElementById("orders").innerHTML=html;
}

function exportCSV(){
let csv="Order,Total,Date\n";
orders.forEach(o=>{
csv+=`Order,${o.finalTotal},${o.date}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="orders.csv";
a.click();
}

</script>

</body>
  </html>
